description = """
Virtual full-lifecycle build contract.

This formula defines the stage names and artifact expectations that concrete
build methodology packs override. Importers should run a concrete child such as
build-basic, compound-build, superpowers-build, or bmad-build.

Launch inputs:
- artifact_root: {{artifact_root}}
- context_path: {{context_path}}
- requirements_path: {{requirements_path}}
- plan_path: {{plan_path}}
- decomposition_path: {{decomposition_path}}
- drain_policy: {{drain_policy}}
- max_iterations: {{max_iterations}}
- push: {{push}}
- open_pr: {{open_pr}}
"""
formula = "build-base"
version = 1
contract = "graph.v2"
target_required = true
internal = true

[vars]
[vars.artifact_root]
description = "Build artifact root."
required = true

[vars.context_path]
description = "Optional source context bundle path."
default = ""

[vars.requirements_path]
description = "Requirements artifact path to create or reuse."
default = ""

[vars.plan_path]
description = "Plan or design artifact path to create or reuse."
default = ""

[vars.decomposition_path]
description = "Task decomposition artifact path to create or reuse."
default = ""

[vars.drain_policy]
description = "Implementation drain policy."
default = "separate"

[vars.max_iterations]
description = "Maximum implementation/review fix attempts."
default = "10"

[vars.push]
description = "Set true to allow final publish push after all checks pass."
default = "false"

[vars.open_pr]
description = "Set true to allow final PR creation after all checks pass."
default = "false"

[[steps]]
id = "prepare"
title = "Prepare build context"
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/build-base/prepare.md"

[[steps]]
id = "requirements"
title = "Produce requirements"
needs = ["prepare"]
metadata = { "gc.run_target" = "gc.requirements-planner" }
description_file = "../assets/workflows/build-base/requirements.md"

[[steps]]
id = "plan"
title = "Produce implementation plan"
needs = ["requirements"]
metadata = { "gc.run_target" = "gc.design-author" }
description_file = "../assets/workflows/build-base/plan.md"

[[steps]]
id = "plan-review"
title = "Review implementation plan"
needs = ["plan"]
metadata = { "gc.run_target" = "gc.review-synthesizer" }
description_file = "../assets/workflows/build-base/plan-review.md"

[[steps]]
id = "decompose"
title = "Decompose approved plan"
needs = ["plan-review"]
metadata = { "gc.run_target" = "gc.task-decomposer" }
description_file = "../assets/workflows/build-base/decompose.md"

[[steps]]
id = "implement"
title = "Implement decomposed work"
needs = ["decompose"]
metadata = { "gc.run_target" = "gc.implementation-worker" }
description_file = "../assets/workflows/build-base/implement.md"

[[steps]]
id = "review"
title = "Review implementation"
needs = ["implement"]
metadata = { "gc.run_target" = "gc.implementation-reviewer" }
description_file = "../assets/workflows/build-base/review.md"

[[steps]]
id = "finalize"
title = "Finalize build result"
needs = ["review"]
metadata = { "gc.run_target" = "gc.run-operator" }
description_file = "../assets/workflows/build-base/finalize.md"

[[steps]]
id = "publish"
title = "Optionally publish build result"
needs = ["finalize"]
metadata = { "gc.run_target" = "gc.publisher" }
description_file = "../assets/workflows/build-base/publish.md"
